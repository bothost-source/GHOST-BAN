<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☠️ GHOST BAN ☠️</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            color: #ff0000;
            font-family: 'Share Tech Mono', monospace;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                linear-gradient(rgba(255,0,0,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,0,0,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0,0,0,0.15),
                rgba(0,0,0,0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 1000;
            animation: scanline 8s linear infinite;
        }

        @keyframes scanline {
            0% { transform: translateY(0); }
            100% { transform: translateY(100vh); }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            padding: 40px 0;
            border-bottom: 2px solid #ff0000;
            margin-bottom: 30px;
            position: relative;
        }

        .header::before, .header::after {
            content: '☠️';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 40px;
            animation: flicker 2s infinite;
        }
        .header::before { left: 20px; }
        .header::after { right: 20px; }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .title {
            font-family: 'Orbitron', sans-serif;
            font-size: 48px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 10px;
            text-shadow: 
                0 0 10px #ff0000,
                0 0 20px #ff0000,
                0 0 40px #ff0000,
                0 0 80px #ff0000;
            animation: glitch 3s infinite;
        }

        @keyframes glitch {
            0%, 90%, 100% { transform: translate(0); }
            92% { transform: translate(-2px, 2px); }
            94% { transform: translate(2px, -2px); }
            96% { transform: translate(-2px, -2px); }
            98% { transform: translate(2px, 2px); }
        }

        .subtitle {
            font-size: 14px;
            color: #ff3333;
            margin-top: 10px;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        .gateway {
            background: rgba(255,0,0,0.05);
            border: 1px solid #ff0000;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 0 30px rgba(255,0,0,0.2);
            backdrop-filter: blur(10px);
        }

        .gateway-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #ff0000;
        }

        .input-group {
            margin: 20px 0;
        }

        .input-group input {
            width: 100%;
            max-width: 400px;
            padding: 15px 20px;
            background: rgba(0,0,0,0.8);
            border: 2px solid #ff0000;
            border-radius: 5px;
            color: #ff0000;
            font-family: 'Share Tech Mono', monospace;
            font-size: 16px;
            letter-spacing: 3px;
            text-align: center;
            outline: none;
            transition: all 0.3s;
        }

        .input-group input:focus {
            box-shadow: 0 0 20px rgba(255,0,0,0.5);
            border-color: #ff3333;
        }

        .input-group input::placeholder {
            color: #660000;
        }

        .btn {
            padding: 15px 40px;
            background: transparent;
            border: 2px solid #ff0000;
            color: #ff0000;
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 10px;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,0,0,0.3), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            background: rgba(255,0,0,0.2);
            box-shadow: 0 0 30px rgba(255,0,0,0.5);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .dashboard {
            display: none;
        }

        .panel {
            background: rgba(255,0,0,0.03);
            border: 1px solid #ff0000;
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(255,0,0,0.1);
        }

        .panel-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #ff0000;
            text-shadow: 0 0 10px #ff0000;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }

        .status-item {
            background: rgba(0,0,0,0.5);
            border: 1px solid #ff0000;
            border-radius: 5px;
            padding: 15px 20px;
            min-width: 150px;
            text-align: center;
        }

        .status-label {
            font-size: 12px;
            color: #ff3333;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .status-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 700;
            text-shadow: 0 0 10px #ff0000;
        }

        .log-box {
            background: rgba(0,0,0,0.8);
            border: 1px solid #ff0000;
            border-radius: 5px;
            padding: 15px;
            height: 200px;
            overflow-y: auto;
            font-size: 12px;
            line-height: 1.6;
        }

        .log-box::-webkit-scrollbar {
            width: 8px;
        }

        .log-box::-webkit-scrollbar-track {
            background: #0a0a0a;
        }

        .log-box::-webkit-scrollbar-thumb {
            background: #ff0000;
            border-radius: 4px;
        }

        .log-entry {
            margin-bottom: 5px;
            padding: 3px 0;
            border-left: 2px solid #ff0000;
            padding-left: 10px;
        }

        .log-time {
            color: #ff3333;
            font-size: 11px;
        }

        .terminal {
            background: #000;
            border: 2px solid #ff0000;
            border-radius: 5px;
            padding: 20px;
            font-family: 'Share Tech Mono', monospace;
            position: relative;
        }

        .terminal::before {
            content: 'root@ghost-ban:~$';
            display: block;
            color: #ff0000;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .terminal-input {
            background: transparent;
            border: none;
            border-bottom: 1px solid #ff0000;
            color: #ff0000;
            font-family: 'Share Tech Mono', monospace;
            font-size: 14px;
            width: 100%;
            padding: 5px;
            outline: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        .hidden { display: none !important; }

        @media (max-width: 600px) {
            .title { font-size: 28px; letter-spacing: 5px; }
            .header::before, .header::after { display: none; }
            .status-bar { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">GHOST BAN</h1>
            <p class="subtitle">☠️ Advanced WhatsApp Group Management Tool ☠️</p>
        </div>

        <div id="gateway" class="gateway">
            <div class="gateway-title">🔐 ACCESS GATEWAY</div>
            <p style="color: #ff3333; margin-bottom: 20px; font-size: 14px;">
                ENTER YOUR ACCESS KEY TO PROCEED
            </p>
            <div class="input-group">
                <input type="password" id="accessKey" placeholder="••••••••••••••••" autocomplete="off">
            </div>
            <button class="btn" onclick="login()">🔓 UNLOCK</button>
            <div id="loginError" style="color: #ff0000; margin-top: 15px; display: none; text-shadow: 0 0 10px #ff0000;">
                ⛔ INVALID ACCESS KEY
            </div>
        </div>

        <div id="dashboard" class="dashboard">
            <div class="panel">
                <div class="panel-title">📊 SYSTEM STATUS</div>
                <div class="status-bar">
                    <div class="status-item">
                        <div class="status-label">Connections</div>
                        <div class="status-value" id="connCount">0</div>
                    </div>
                    <div class="status-item">
                        <div class="status-label">Uptime</div>
                        <div class="status-value" id="uptime">0m</div>
                    </div>
                    <div class="status-item">
                        <div class="status-label">Status</div>
                        <div class="status-value pulse" style="color: #00ff00; text-shadow: 0 0 10px #00ff00;">ONLINE</div>
                    </div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-title">📱 PAIR WHATSAPP</div>
                <div class="input-group">
                    <input type="text" id="pairNumber" placeholder="PHONE NUMBER (e.g. 237620080874)">
                </div>
                <button class="btn" onclick="pairWhatsApp()">🔗 GENERATE PAIRING CODE</button>
                <div id="pairResult" style="margin-top: 15px; font-size: 14px;"></div>
            </div>

            <div class="panel">
                <div class="panel-title">☠️ GHOST BAN</div>
                <div class="input-group">
                    <input type="text" id="banNumber" placeholder="TARGET NUMBER (e.g. 234712345678)">
                </div>
                <button class="btn" onclick="executeBan()">💀 EXECUTE BAN</button>
                <div id="banResult" style="margin-top: 15px; font-size: 14px;"></div>
            </div>

            <div class="panel">
                <div class="panel-title">⭐ PREMIUM MANAGEMENT</div>
                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <input type="text" id="premUserId" placeholder="USER ID" style="flex: 1; min-width: 200px;">
                    <button class="btn" onclick="addPremium()">➕ ADD</button>
                    <button class="btn" onclick="delPremium()">➖ REMOVE</button>
                    <button class="btn" onclick="listPremium()">📋 LIST</button>
                </div>
                <div id="premResult" style="margin-top: 15px; font-size: 14px;"></div>
            </div>

            <div class="panel">
                <div class="panel-title">📜 ACTIVITY LOG</div>
                <div class="log-box" id="logBox">
                    <div class="log-entry">
                        <span class="log-time">[SYSTEM]</span> GHOST BAN initialized...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let accessKey = '';
        let startTime = Date.now();

        function log(msg, type = 'info') {
            const box = document.getElementById('logBox');
            const time = new Date().toLocaleTimeString();
            const color = type === 'error' ? '#ff0000' : (type === 'success' ? '#00ff00' : '#ff3333');
            box.innerHTML += `<div class="log-entry" style="border-left-color: ${color}"><span class="log-time">[${time}]</span> ${msg}</div>`;
            box.scrollTop = box.scrollHeight;
        }

        function login() {
            const key = document.getElementById('accessKey').value.trim();
            if (!key) {
                document.getElementById('loginError').style.display = 'block';
                return;
            }

            fetch('/health', { headers: { 'X-Access-Key': key } })
                .then(r => {
                    if (r.ok) {
                        accessKey = key;
                        document.getElementById('gateway').style.display = 'none';
                        document.getElementById('dashboard').style.display = 'block';
                        log('🔓 Access granted. Welcome to GHOST BAN.');
                        updateStatus();
                        setInterval(updateStatus, 30000);
                    } else {
                        document.getElementById('loginError').style.display = 'block';
                    }
                })
                .catch(() => {
                    document.getElementById('loginError').style.display = 'block';
                });
        }

        function updateStatus() {
            fetch('/health', { headers: { 'X-Access-Key': accessKey } })
                .then(r => r.json())
                .then(data => {
                    document.getElementById('connCount').textContent = data.connections || 0;
                    const mins = Math.floor(data.uptime / 60);
                    document.getElementById('uptime').textContent = mins + 'm';
                })
                .catch(() => {});
        }

        function pairWhatsApp() {
            const num = document.getElementById('pairNumber').value.replace(/[^0-9]/g, '');
            if (!num) return log('❌ Enter a phone number', 'error');

            log('🔄 Requesting pairing code for ' + num + '...');
            fetch('/api/pair', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-Access-Key': accessKey },
                body: JSON.stringify({ phoneNumber: num })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    document.getElementById('pairResult').innerHTML = 
                        '<span style="color: #00ff00;">✅ Pairing Code: <code style="font-size: 18px; text-shadow: 0 0 10px #00ff00;">' + data.pairingCode + '</code></span>';
                    log('✅ Pairing code generated: ' + data.pairingCode, 'success');
                } else {
                    document.getElementById('pairResult').innerHTML = '<span style="color: #ff0000;">❌ ' + (data.error || 'Failed') + '</span>';
                    log('❌ Pairing failed: ' + (data.error || 'Unknown'), 'error');
                }
            })
            .catch(err => {
                log('❌ Error: ' + err.message, 'error');
            });
        }

        function executeBan() {
            const num = document.getElementById('banNumber').value.replace(/[^0-9]/g, '');
            if (!num) return log('❌ Enter a target number', 'error');

            log('💀 Executing ban on ' + num + '...');
            fetch('/api/ban', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-Access-Key': accessKey },
                body: JSON.stringify({ targetNumber: num })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    document.getElementById('banResult').innerHTML = 
                        '<span style="color: #00ff00;">✅ ' + data.message + '</span>';
                    log('✅ Ban executed on ' + num + ' - ' + data.message, 'success');
                } else {
                    document.getElementById('banResult').innerHTML = '<span style="color: #ff0000;">❌ ' + (data.error || 'Failed') + '</span>';
                    log('❌ Ban failed: ' + (data.error || 'Unknown'), 'error');
                }
            })
            .catch(err => {
                log('❌ Error: ' + err.message, 'error');
            });
        }

        function addPremium() {
            const uid = document.getElementById('premUserId').value.trim();
            if (!uid) return;
            fetch('/api/addprem', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-Access-Key': accessKey },
                body: JSON.stringify({ userId: uid })
            })
            .then(r => r.json())
            .then(data => {
                log(data.message, data.success ? 'success' : 'error');
            });
        }

        function delPremium() {
            const uid = document.getElementById('premUserId').value.trim();
            if (!uid) return;
            fetch('/api/delprem', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-Access-Key': accessKey },
                body: JSON.stringify({ userId: uid })
            })
            .then(r => r.json())
            .then(data => {
                log(data.message, data.success ? 'success' : 'error');
            });
        }

        function listPremium() {
            fetch('/api/listprem', { headers: { 'X-Access-Key': accessKey } })
            .then(r => r.json())
            .then(data => {
                if (data.premium.length === 0) {
                    log('📋 No premium users');
                } else {
                    log('📋 Premium users: ' + data.premium.join(', '));
                }
            });
        }

        document.getElementById('accessKey').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
